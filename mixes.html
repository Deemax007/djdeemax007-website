<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DJ_DeeMax_007 Mixes</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

nav{
margin-top:20px;
}

nav a{
color:gold;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:white;
}

h1{
margin-top:30px;
}

h2{
color:gold;
margin-top:20px;
}

audio{
margin-top:10px;
}

.mix-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
gap:25px;
justify-items:center;
align-items:start;
margin-top:40px;
padding:0 15px;
}

.mix-card{
background:#111;
padding:18px;
border-radius:15px;
box-shadow:0 0 20px gold;
max-width:260px;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.mix-card{
transition:0.3s ease;
}

.mix-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 0 30px gold;
}

.mix-cover{
position:relative;
cursor:pointer;
}

.mix-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
font-size:40px;
color:white;
opacity:0;
transition:0.3s;
}

.mix-cover:hover .play-icon{
opacity:1;
}
button{
background:gold;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
margin-top:10px;
}
button:hover{
background:white;
}
.mix-card{
display:flex;
flex-direction:column;
align-items:center;
}

.download-btn{
margin-top:10px;
}
.missing-audio{
color:gray;
font-size:14px;
margin-top:8px;
font-style:italic;
}
.mix-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.download-btn{
margin-top:8px;
width:100%;
}
@media (max-width:600px){
.mix-card{
max-width:90%;
}

h1{
font-size:40px;
}

nav{
flex-wrap:wrap;
gap:15px;
}
}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="mixes.html">Mixes</a>
<a href="#">Contact</a>
</nav>

</html>
